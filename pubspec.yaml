name: erpnext_stock_mobile
description: Android-first operational app for supplier and warehouse workflows.
publish_to: none

version: 0.1.0+3

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.2
  flutter_svg: ^2.2.0
  google_fonts: ^6.2.1
  http: ^1.5.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  device_preview: ^1.3.1
  local_auth: ^2.3.0
  crypto: ^3.0.7
  flutter_local_notifications: ^18.0.1
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10
  full_screen_back_gesture: ^0.0.2
  gal: ^2.3.2
  pdfx: ^2.9.2
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  local_auth_darwin:
    path: third_party/local_auth_darwin

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/branding/accord_vision_icon.png
  min_sdk_android: 21
