name: erpnext_stock_mobile
description: Android-first operational app for supplier and warehouse workflows.
publish_to: none

version: 0.1.0+3

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.2
  google_fonts: ^6.2.1
  http: ^1.5.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  device_preview: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/branding/accord_vision_icon.png
  min_sdk_android: 21
